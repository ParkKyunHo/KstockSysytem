# V7.1 Feature Flags
#
# Purpose: V7.1 전환 중 V7.0 운영을 보호하면서 V7.1 신규 모듈을 점진 활성화한다.
# Source of truth: docs/v71/05_MIGRATION_PLAN.md §10 (Feature Flag 전략)
#
# Convention:
#   - 모든 V7.1 신규 코드는 진입점에서 src.utils.feature_flags.is_enabled('v71.<flag>')
#     로 가드되어야 한다 (하네스 5가 강제).
#   - 환경변수 V71_FF__<DOTTED_PATH>=true|false 로 런타임 오버라이드 가능.
#     예) V71_FF__V71__BOX_SYSTEM=true
#   - false 가 기본값이며, V7.0 동작이 변경 없이 유지된다.
#
# Phase 매핑:
#   - Phase 3 완료 후: box_system, vi_monitor, reconciliation_v71 → 페이퍼에서 true
#   - Phase 4 완료 후: notification_v71 → true
#   - Phase 5 완료 후: web_dashboard → true
#   - Phase 6 완료 후: reporting → true

v71:
  # ───────────────────────────────────────────────────────────────────
  # P-Wire-Box-1 INVARIANT (자금 안전 — 위반 시 rollback 불가능):
  #   V71BoxManager가 DB-backed로 전환되어 사용자 박스가 DB에 즉시 표시되지만,
  #   자동 박스 생성 + 자동 매수 경로는 P-Wire-Box-2/3/4 land 전까지 차단해야 함.
  #   P-Wire-Box-2 land 전까지 다음 5 flag는 반드시 false 유지:
  #     box_entry_detector / pullback_strategy / breakout_strategy /
  #     path_b_daily / buy_executor_v71
  #   사용자 수동 박스 등록만 허용. 활성 시 자동 매수 발화 → 자금 위험.
  #   trading_bridge.py가 boot 시점에 invariant 위반 감지 시 CRITICAL 알림.
  # ───────────────────────────────────────────────────────────────────

  # Phase 3: 거래 룰 (02_TRADING_RULES.md)
  box_system: false           # §3 박스 시스템 (사용자 정의 진입 영역) — P-Wire-Box-1 land 후 활성 가능
  pullback_strategy: false    # §4.1 PATH_A 눌림 진입 — P-Wire-Box-INVARIANT 적용
  breakout_strategy: false    # §4.2 PATH_A 돌파 진입 — P-Wire-Box-INVARIANT 적용
  path_b_daily: false         # §4.3 PATH_B 일봉 중기 — P-Wire-Box-INVARIANT 적용
  exit_v71: false             # §5 단계별 손절 + 분할 익절 + V7.1 ATR 배수
  position_v71: false         # §6 평단가 가중평균 + 이벤트 리셋
  manual_trade_handler: false # §7 수동 거래 시나리오 A/B/C/D
  vi_monitor: false           # §10 VI 상태 머신
  restart_recovery: false     # §13 7-Step 복구 시퀀스
  reconciliation_v71: false   # §7/§13 포지션 정합성

  # Phase 4: 알림
  notification_v71: false     # §9 4단계 등급 + 우선순위 큐
  telegram_commands_v71: false # 13개 명령어
  daily_summary: false         # 매일 15:30
  monthly_review: false        # 매월 1일

  # Phase 5: 웹 대시보드
  web_dashboard: false         # FastAPI + JWT + 2FA
  websocket_updates: false     # 실시간 포지션 푸시

  # Phase 6: 리포트
  reporting: false             # Claude Opus 4.7 종목 리포트
  report_pdf_export: false
  report_excel_export: false

  # Phase 5 후속 / Phase 7 wiring: 키움 거래 인프라
  kiwoom_exchange: false       # P-Wire-1 — V71KiwoomClient + V71OrderManager + V71KiwoomExchangeAdapter
  buy_executor_v71: false      # P-Wire-4a — V71BuyExecutor — P-Wire-Box-INVARIANT 적용 (자동 매수 발화 경로)
  exit_executor_v71: false     # P-Wire-4b — V71ExitExecutor (stop loss / TS / partial profit-take)
  kiwoom_websocket: false      # P-Wire-5 — V71KiwoomWebSocket realtime channels (PRICE / ORDER / BALANCE / VI)
  exit_orchestrator: false     # P-Wire-6 — V71ExitOrchestrator (PRICE_TICK → ExitCalculator → ExitExecutor)

  # Phase A 산출 (V7.0 폐기 후 V7.1 candle/market 인프라)
  candle_builder: false        # P-Wire-12 — V71CandleManager attach (PATH_A 3분봉 + PATH_B 일봉, 자동 박스 감지)
  box_entry_detector: false    # P-Wire-13 — V71BoxEntryDetector — P-Wire-Box-INVARIANT 적용 (자동 진입 차단 경로)
